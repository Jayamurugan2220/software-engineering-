# Green deployment: standby until switched
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-green
  labels:
    app: my-app
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
      version: green
  template:
    metadata:
      labels:
        app: my-app
        version: green
        active: "false"
    spec:
      containers:
        - name: my-app
          image: REPLACE_IMAGE
          ports:
            - containerPort: 80
          imagePullPolicy: IfNotPresent
