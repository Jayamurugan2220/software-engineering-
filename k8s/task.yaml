apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: softer-eng
  labels:
    app: task-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: task-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/taskdb"
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: softer-eng
  labels:
    app: task-service
spec:
  type: ClusterIP
  selector:
    app: task-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
