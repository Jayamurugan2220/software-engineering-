name: CI/CD - Blue/Green deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: my-app
      REGISTRY: ${{ secrets.REGISTRY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.user-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Restore kubeconfig from secret
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/blue-deployment.yaml
          kubectl apply -f k8s/green-deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Switch traffic to new release (optional)
        if: always()
        run: |
          # Example: switch Service selector to the deployment version you want to receive traffic.
          # By default blue deployment is marked active. To switch to green:
          # kubectl patch service my-app -p '{"spec":{"selector":{"app":"my-app","active":"false","version":"green"}}}'
          echo "Manually patch the Service selector to switch traffic between blue/green."
